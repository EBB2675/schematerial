# NOMAD Metainfo ↔ Emmet (Materials Project) ground truth
#
# role: discovery
# No production crosswalk exists between these two schemas. Both describe
# DFT calculations (primarily VASP) of crystalline materials, but the
# structural choices diverge significantly:
#   - NOMAD: deep section hierarchy, SI units, last-calculation indexing
#   - Emmet: flat Pydantic JSON, eV + Å (pymatgen convention), calcs_reversed[0]
#
# This file is hand-written by domain expert review of both schema definitions.
# It should be treated as the reference answer when evaluating Schematerial's
# automated alignment on this pair.
#
# provenance:
#   nomad:  https://nomad-lab.eu/prod/v1/staging/docs/reference/archive.html
#   emmet:  https://github.com/materialsproject/emmet (TaskDocument schema)
#   created: 2026-06-23
#   method: hand-written; cross-checked against NOMAD metainfo definitions
#           and emmet TaskDocument / CalcDoc Pydantic models

metadata:
  role: discovery
  source_schema: "NOMAD Metainfo"
  target_schema: "Emmet (Materials Project)"
  confidence_basis: hand-written domain expert review
  created: "2026-06-23"

mappings:

  # --- Energy fields ---

  - source_field: energy_total
    source_path: run[0].calculation[-1].energy.total.value
    target_field: energy
    target_path: calcs_reversed[0].output.energy
    relation: exact
    confidence: 0.95
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: >
      Both are the DFT SCF total energy (VASP TOTEN). Confidence < 1.0 because
      NOMAD calculation[-1] and Emmet calcs_reversed[0] both refer to the final
      ionic step, but this must be verified per-entry for multi-step relaxations.

  - source_field: energy_total_per_atom
    source_path: run[0].calculation[-1].energy.total.value_per_atom
    target_field: energy_per_atom
    target_path: calcs_reversed[0].output.energy_per_atom
    relation: exact
    confidence: 0.95
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: Same caveats as energy_total regarding final-step indexing.

  # --- Structure counts and formula ---

  - source_field: n_atoms
    source_path: run[0].system[-1].atoms.n_atoms
    target_field: nsites
    target_path: nsites
    relation: exact
    confidence: 1.0
    transform: null
    notes: >
      Direct integer equality. Note that Emmet nsites is a top-level field on
      TaskDocument, not nested under calcs_reversed.

  - source_field: chemical_composition_reduced
    source_path: run[0].system[-1].chemical_composition_reduced
    target_field: formula_pretty
    target_path: formula_pretty
    relation: close
    confidence: 0.85
    transform: null
    notes: >
      Both are reduced formulas but with different element ordering conventions.
      NOMAD uses Hill order (C, H, then alphabetical). Emmet formula_pretty uses
      pymatgen's electronegativity-based ordering. For single-element systems
      (Si, Fe) these are identical. For binary+ systems they will differ:
      e.g. NOMAD "GaAs" vs Emmet "AsGa" or vice versa depending on
      electronegativity ordering. Treat as CLOSE, not EXACT.

  # --- Lattice and positions ---

  - source_field: lattice_vectors
    source_path: run[0].system[-1].atoms.lattice_vectors
    target_field: lattice_matrix
    target_path: calcs_reversed[0].output.structure.lattice.matrix
    relation: exact
    confidence: 0.95
    transform:
      op: unit_conversion
      from_unit: m
      to_unit: Angstrom
      factor: 1.0e10
    notes: >
      Both are 3×3 matrices with rows as lattice vectors (a, b, c). Emmet
      lattice.matrix follows pymatgen convention which matches NOMAD's row order.
      Unit conversion only.

  - source_field: atom_positions
    source_path: run[0].system[-1].atoms.positions
    target_field: site_positions
    target_path: calcs_reversed[0].output.structure.sites[].xyz
    relation: exact
    confidence: 0.9
    transform:
      op: unit_conversion
      from_unit: m
      to_unit: Angstrom
      factor: 1.0e10
    notes: >
      Both are Cartesian coordinates in the same frame. Emmet also exposes
      fractional coordinates (sites[].abc) — prefer xyz for an exact mapping.
      The [] notation indicates per-site array indexing.

  - source_field: atom_labels
    source_path: run[0].system[-1].atoms.labels
    target_field: site_labels
    target_path: calcs_reversed[0].output.structure.sites[].label
    relation: exact
    confidence: 0.9
    transform: null
    notes: >
      Both are per-site element symbol strings. Emmet stores these as site.label
      which for elemental sites equals the element symbol.

  # --- Band gap ---

  - source_field: band_gap
    source_path: run[0].calculation[-1].band_gap[0].value
    target_field: band_gap
    target_path: calcs_reversed[0].output.bandgap
    relation: exact
    confidence: 0.85
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: >
      NOMAD band_gap[0] is spin-averaged or total gap. Emmet output.bandgap is
      the minimum gap across spin channels. These are equivalent for
      non-spin-polarised calculations. For spin-polarised systems, verify
      whether NOMAD band_gap[0] or band_gap[1] is the correct counterpart.
      Confidence reflects this ambiguity.
