# Emmet (Materials Project) — hand-curated schema fixture
# Units: eV for energies, Angstroms for lengths (pymatgen convention).
# Emmet models are Pydantic-based; paths reflect the JSON serialisation
# of TaskDocument / StructureDoc as returned by the MP API.
# Source: https://github.com/materialsproject/emmet

name: "Emmet"
version: "0.84"
description: >
  Pydantic-modelled JSON from the Materials Project task documents.
  Primary entry point is TaskDocument; structure data comes via pymatgen
  Structure objects serialised under "output.structure".

fields:
  - name: energy
    path: calcs_reversed[0].output.energy
    dtype: float
    unit: eV
    description: Total DFT energy for the calculation (VASP TOTEN).

  - name: energy_per_atom
    path: calcs_reversed[0].output.energy_per_atom
    dtype: float
    unit: eV/atom
    description: Total energy divided by number of sites.

  - name: nsites
    path: nsites
    dtype: int
    unit: null
    description: Number of sites in the output structure.

  - name: formula_pretty
    path: formula_pretty
    dtype: str
    unit: null
    description: >
      Human-readable reduced formula (e.g. "Si", "GaAs"). Generated by
      pymatgen's Composition class; element order follows electronegativity.

  - name: lattice_matrix
    path: calcs_reversed[0].output.structure.lattice.matrix
    dtype: float[3][3]
    unit: Angstrom
    description: >
      Lattice vectors as a 3x3 matrix in Angstroms. Rows are the a, b, c vectors.

  - name: site_positions
    path: calcs_reversed[0].output.structure.sites[].xyz
    dtype: float[N][3]
    unit: Angstrom
    description: Cartesian coordinates of each site in Angstroms.

  - name: band_gap
    path: calcs_reversed[0].output.bandgap
    dtype: float
    unit: eV
    description: DFT band gap in eV. Zero for metals.
