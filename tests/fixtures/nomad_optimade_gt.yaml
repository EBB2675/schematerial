# NOMAD Metainfo ↔ OPTIMADE: calibration ground truth
# NOMAD is an OPTIMADE provider; this mapping exists as production adapter code.
# Use for scoring calibration only; not a discovery case.
# Adapter: nomad/app/v1/routers/optimade.py, nomad/normalizing/optimade.py
# Spec: https://github.com/Materials-Consortia/OPTIMADE (v1.2)

metadata:
  role: calibration
  source_schema: "NOMAD Metainfo"
  target_schema: "OPTIMADE v1.2"
  confidence_basis: production adapter code
  created: "2026-06-23"

mappings:

  - source_field: energy_total
    source_path: run[0].calculation[-1].energy.total.value
    target_field: total_energy
    target_path: attributes._nomad_total_energy
    relation: exact
    confidence: 1.0
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: "DFT SCF total energy; unit conversion only."

  - source_field: energy_total_per_atom
    source_path: run[0].calculation[-1].energy.total.value_per_atom
    target_field: energy_per_atom
    target_path: attributes._nomad_energy_per_atom
    relation: exact
    confidence: 1.0
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: "Same transform as energy_total; total / n_atoms in both schemas."

  - source_field: n_atoms
    source_path: run[0].system[-1].atoms.n_atoms
    target_field: nsites
    target_path: attributes.nsites
    relation: exact
    confidence: 1.0
    transform: null
    notes: "Direct integer equality."

  - source_field: chemical_composition_reduced
    source_path: run[0].system[-1].chemical_composition_reduced
    target_field: chemical_formula_reduced
    target_path: attributes.chemical_formula_reduced
    relation: close
    confidence: 0.95
    transform: null
    notes: "OPTIMADE requires alphabetical ordering; NOMAD uses Hill convention. Identical for single-element systems."

  - source_field: lattice_vectors
    source_path: run[0].system[-1].atoms.lattice_vectors
    target_field: lattice_vectors
    target_path: attributes.lattice_vectors
    relation: exact
    confidence: 1.0
    transform:
      op: unit_conversion
      from_unit: m
      to_unit: Angstrom
      factor: 1.0e10
    notes: "Same row convention (a, b, c). Unit conversion only."

  - source_field: atom_positions
    source_path: run[0].system[-1].atoms.positions
    target_field: cartesian_site_positions
    target_path: attributes.cartesian_site_positions
    relation: exact
    confidence: 1.0
    transform:
      op: unit_conversion
      from_unit: m
      to_unit: Angstrom
      factor: 1.0e10
    notes: "Same Cartesian frame as lattice_vectors. Unit conversion only."

  - source_field: atom_labels
    source_path: run[0].system[-1].atoms.labels
    target_field: species_at_sites
    target_path: attributes.species_at_sites
    relation: exact
    confidence: 1.0
    transform: null
    notes: "Length-N list of element symbol strings."

  - source_field: band_gap
    source_path: run[0].calculation[-1].band_gap[0].value
    target_field: band_gap
    target_path: attributes._nomad_band_gap
    relation: exact
    confidence: 1.0
    transform:
      op: unit_conversion
      from_unit: J
      to_unit: eV
      factor: 6.241509074e18
    notes: "band_gap[0] is the spin-averaged value. Unit conversion only."

  - source_field: periodicity
    source_path: run[0].system[-1].atoms.periodic
    target_field: dimension_types
    target_path: attributes.dimension_types
    relation: exact
    confidence: 0.9
    transform:
      op: enum_remap
      mapping:
        "true": "1"
        "false": "0"
    notes: "NOMAD: length-3 bool list. OPTIMADE: length-3 int list (0/1)."

  - source_field: n_periodic_dimensions
    source_path: run[0].system[-1].atoms.periodic
    target_field: nperiodic_dimensions
    target_path: attributes.nperiodic_dimensions
    relation: exact
    confidence: 0.9
    transform: null
    notes: "Derived as sum(dimension_types). Always 3 for bulk crystals."

  - source_field: energy_total
    source_path: run[0].calculation[-1].energy.total.value
    target_field: energy_above_hull
    target_path: attributes.energy_above_hull
    relation: none
    confidence: 1.0
    transform: null
    notes: "energy_above_hull is a convex-hull stability metric, not a single-calculation property."

  - source_field: energy_free
    source_path: run[0].calculation[-1].energy.free.value
    target_field: total_energy
    target_path: attributes._nomad_total_energy
    relation: none
    confidence: 1.0
    transform: null
    notes: "F = E - TS; distinct from total energy even when numerically equal at 0 K."
